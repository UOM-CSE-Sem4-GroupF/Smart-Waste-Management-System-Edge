services:
  mosquitto:
    image: eclipse-mosquitto
    container_name: swms-local-mosquitto
    ports:
      - "1884:1883"
    volumes:
      - ../gateway/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - edge-net

  nodered:
    image: nodered/node-red
    container_name: swms-nodered
    depends_on:
      - mosquitto
      - emqx
    ports:
      - "1880:1880"
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      CLOUD_MQTT_BROKER: emqx
      CLOUD_MQTT_PORT: "1883"
      CLOUD_MQTT_USER: gateway
      CLOUD_MQTT_PASSWORD: gatewaypass
    volumes:
      - ../gateway/flows.json:/data/flows.json:ro
      - ../gateway/settings.js:/data/settings.js:ro
    networks:
      - edge-net

  simulator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: swms-edge-simulator
    depends_on:
      - mosquitto
      - registry
    ports:
      - "9102:9102"
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC_PREFIX: sensors
      SIM_SPEED_FACTOR: "60"
      SIM_METRICS_PORT: "9102"
      LESHAN_REGISTRY_URL: http://registry:8090
      OTA_FAILURE_RATE: "0.05"
    networks:
      - edge-net

  emqx:
    image: emqx/emqx:5.3.0
    container_name: swms-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123
      EMQX_ALLOW_ANONYMOUS: "true"
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edge-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: swms-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edge-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: swms-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - edge-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: swms-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    volumes:
      - ../broker/scripts/create-topics.sh:/scripts/create-topics.sh:ro
    networks:
      - edge-net

  kafka-ui:
    image: redpandadata/console:v2.3.8
    container_name: swms-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    networks:
      - edge-net

  emqx-bridge:
    build:
      context: ../broker/bridge
      dockerfile: Dockerfile
    container_name: swms-emqx-bridge
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "9100:9100"
    environment:
      EMQX_HOST: emqx
      EMQX_PORT: "1883"
      EMQX_USERNAME: sensor-device
      EMQX_PASSWORD: sensorpass
      KAFKA_BOOTSTRAP: kafka:29092
      METRICS_PORT: "9100"
    networks:
      - edge-net

  validator:
    build:
      context: ..
      dockerfile: broker/validator/Dockerfile
    container_name: swms-schema-validator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9101:9101"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: waste.bin.telemetry
      SCHEMA_PATH: /app/telemetry.schema.json
      METRICS_PORT: "9101"
    networks:
      - edge-net

  leshan:
    build:
      context: ../leshan/mock
      dockerfile: Dockerfile
    container_name: swms-leshan-demo
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - edge-net

  registry:
    build:
      context: ../leshan/registry
      dockerfile: Dockerfile
    container_name: swms-device-registry
    ports:
      - "8090:8090"
    restart: unless-stopped
    networks:
      - edge-net

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: swms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - edge-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: swms-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - edge-net

networks:
  edge-net:
    driver: bridge

services:
  simulator:
    build: .
    container_name: swms-edge-simulator
    env_file:
      - path: .env
        required: false
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-localhost}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-sensors}
      SIM_SPEED_FACTOR: ${SIM_SPEED_FACTOR:-60}
      SIM_METRICS_PORT: ${SIM_METRICS_PORT:-9102}
      LESHAN_REGISTRY_URL: ${LESHAN_REGISTRY_URL:-}
      OTA_FAILURE_RATE: ${OTA_FAILURE_RATE:-0.05}
    ports:
      - "9102:9102"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

%% ACL rules for EMQX
%% Format: {allow | deny, user | all, pub | sub | pubsub, ["topic", ...]}

%% sensor-device user: allowed to publish telemetry and vehicle topics
{allow, {user, "sensor-device"}, publish, ["sensors/bin/+/telemetry", "vehicle/+/location"]}.
{allow, {user, "sensor-device"}, subscribe, ["commands/bin/+/firmware"]}.

%% gateway user: allowed to publish (after dedup/sanity) and subscribe
{allow, {user, "gateway"}, pubsub, ["sensors/bin/+/telemetry", "vehicle/+/location"]}.

%% bridge internal user: subscribe only (reads from EMQX to forward to Kafka)
{allow, {user, "emqx-bridge"}, subscribe, ["sensors/bin/+/telemetry", "vehicle/+/location"]}.

%% Deny everything else
{deny, all}.
